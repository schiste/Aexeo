#:schema ../config.schema.json

version = 1
profile = "generic"

[site]
url = "https://example.com"
source_dir = "dist"
adapter = "astro-dist"
canonical_style = "extensionless"

[runtime]
engine = "http"
wait_until = "networkidle"
use_sitemap = true
artifact_dir = ".aexeo-reports/crawl-artifacts"

[policy]
ignore_rules = []
ignore_paths = []

[rules.html]
enabled = true
require_html_lang = true
require_hreflang_self = false

[rules.links]
enabled = true
min_inbound_links = 1
link_suggestion_count = 3
enable_link_autofix = false
related_links_heading = "Related pages"
weak_anchor_text = ["click here", "learn more", "read more"]

[rules.schema]
enabled = true
required_types = []
required_families = []
require_breadcrumb_schema = false
require_title_alignment = true

[rules.sitemap]
enabled = true

[rules.robots]
enabled = true
require_sitemap = true
require_meta_consistency = true

[rules.social]
enabled = true
require_open_graph = true
require_twitter_card = true
default_twitter_card = "summary"
require_social_images = false
require_twitter_image = false

[rules.llm]
enabled = true

[rules.content]
enabled = true
min_page_size = 500
required_feature_markers = ["Related features"]

[rules.structure]
enabled = true
repeatable_data_ui = ["card", "item", "entry"]
utility_route_patterns = ["search", "admin", "preview", "internal"]
min_block_text_length = 120
min_answer_blocks = 2
require_fact_consistency = true

[output]
baseline_file = ".aexeo-baseline.json"
audit_log_limit = 5

[quality]
typecheck_command = "cargo check --workspace"
coverage_threshold = 85
complexity_threshold = 12
performance_budget_file = "performance-budget.json"
