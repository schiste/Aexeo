version = 1
profile = "generic"

[site]
url = "https://example.com"
source_dir = "."
adapter = "auto"
canonical_style = "extensionless"

[runtime]
engine = "http"

[rules.html]
enabled = true

[rules.links]
enabled = true
link_suggestion_count = 3
enable_link_autofix = false
related_links_heading = "Related pages"
weak_anchor_text = ["click here", "learn more", "read more", "here", "more"]

[rules.sitemap]
enabled = true

[rules.robots]
enabled = true
require_sitemap = true
require_meta_consistency = true

[rules.social]
enabled = true
require_open_graph = true
require_twitter_card = true
default_twitter_card = "summary"
require_social_images = false
require_twitter_image = false

[rules.schema]
enabled = true
required_types = []

[rules.llm]
enabled = true

[rules.surfaces]
enabled = true

[rules.content]
enabled = true
min_page_size = 500
required_feature_markers = ["Related features"]

[rules.structure]
enabled = true
min_block_text_length = 120
min_answer_blocks = 2
require_fact_consistency = true
